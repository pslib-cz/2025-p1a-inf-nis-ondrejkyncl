<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="100%" height="100%">
    <defs>
        <marker id="agg" viewBox="0 0 12 12" refX="0" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
            <path d="M 0 6 L 6 1 L 12 6 L 6 11 Z" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
        </marker>
    </defs>
    <style>
        .title { font-family: 'Arial', sans-serif; font-size: 16px; font-weight: bold; fill: #0f172a; text-anchor: middle; }
        .cls { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; }
        .hdr { font-family: 'Arial', sans-serif; font-size: 13px; font-weight: bold; fill: #0f172a; text-anchor: middle; }
        .attr { font-family: 'Arial', sans-serif; font-size: 11px; fill: #1e293b; }
        .meth { font-family: 'Arial', sans-serif; font-size: 11px; fill: #047857; }
    </style>
    <text x="500" y="30" class="title">4. KOMPLEXNÍ CLASS DIAGRAM (DATABÁZOVÝ NÁVRH)</text>

    <g transform="translate(50, 80)"><rect x="0" y="0" width="160" height="70" class="cls"/><text x="80" y="20" class="hdr">Třída</text><line x1="0" y1="28" x2="160" y2="28" stroke="#334155"/><text x="10" y="45" class="attr">- tridaID: int [PK]</text><text x="10" y="60" class="attr">- nazev: string</text></g>
    
    <g transform="translate(280, 80)"><rect x="0" y="0" width="220" height="150" class="cls"/><text x="110" y="20" class="hdr">Uživatel</text><line x1="0" y1="28" x2="220" y2="28" stroke="#334155"/><text x="10" y="45" class="attr">- userID: int [PK]</text><text x="10" y="60" class="attr">- emailPSLIB: string</text><text x="10" y="75" class="attr">- prezdivka: string</text><text x="10" y="90" class="attr">- avatarUrl: string</text><text x="10" y="105" class="attr">- role: EnumRole</text><line x1="0" y1="115" x2="220" y2="115" stroke="#334155"/><text x="10" y="130" class="meth">+ registrovatUcet()</text><text x="10" y="145" class="meth">+ upravitProfil()</text></g>

    <g transform="translate(50, 280)"><rect x="0" y="0" width="180" height="120" class="cls"/><text x="90" y="20" class="hdr">Tým</text><line x1="0" y1="28" x2="180" y2="28" stroke="#334155"/><text x="10" y="45" class="attr">- tymID: int [PK]</text><text x="10" y="60" class="attr">- nazev: string</text><text x="10" y="75" class="attr">- logoUrl: string</text><line x1="0" y1="85" x2="180" y2="85" stroke="#334155"/><text x="10" y="100" class="meth">+ spravovatSoupisku()</text><text x="10" y="115" class="meth">+ upravitDetailyTymu()</text></g>

    <g transform="translate(300, 310)"><rect x="0" y="0" width="220" height="180" class="cls"/><text x="110" y="20" class="hdr">Zápas</text><line x1="0" y1="28" x2="220" y2="28" stroke="#334155"/><text x="10" y="45" class="attr">- zapasID: int [PK]</text><text x="10" y="60" class="attr">- datumCas: DateTime</text><text x="10" y="75" class="attr">- delkaTrvaniMin: int</text><text x="10" y="90" class="attr">- skoreDomaci: int</text><text x="10" y="105" class="attr">- skoreHoste: int</text><text x="10" y="120" class="attr">- stavOvereni: EnumStav</text><line x1="0" y1="130" x2="220" y2="130" stroke="#334155"/><text x="10" y="145" class="meth">+ zadatVysledek()</text><text x="10" y="160" class="meth">+ potvrditSouperem()</text><text x="10" y="175" class="meth">+ publikovatDoFeedu()</text></g>

    <g transform="translate(50, 480)"><rect x="0" y="0" width="180" height="110" class="cls"/><text x="90" y="20" class="hdr">Výzva (Challenge)</text><line x1="0" y1="28" x2="180" y2="28" stroke="#334155"/><text x="10" y="45" class="attr">- vyzvaID: int [PK]</text><text x="10" y="60" class="attr">- navrhovanyCas: DateTime</text><text x="10" y="75" class="attr">- stav: EnumStavVyzvy</text><line x1="0" y1="85" x2="180" y2="85" stroke="#334155"/><text x="10" y="100" class="meth">+ odeslatVyzvu()</text></g>

    <g transform="translate(580, 80)"><rect x="0" y="0" width="200" height="110" class="cls"/><text x="100" y="20" class="hdr">Notifikace</text><line x1="0" y1="28" x2="200" y2="28" stroke="#334155"/><text x="10" y="45" class="attr">- notifID: int [PK]</text><text x="10" y="60" class="attr">- zprava: string</text><text x="10" y="75" class="attr">- precteno: bool</text><line x1="0" y1="85" x2="200" y2="85" stroke="#334155"/><text x="10" y="100" class="meth">+ oznacitJakoPrectene()</text></g>

    <g transform="translate(760, 240)"><rect x="0" y="0" width="180" height="110" class="cls"/><text x="90" y="20" class="hdr">Achievement</text><line x1="0" y1="28" x2="180" y2="28" stroke="#334155"/><text x="10" y="45" class="attr">- achID: int [PK]</text><text x="10" y="60" class="attr">- nazevOdznaku: string</text><text x="10" y="75" class="attr">- popisMilniku: string</text><line x1="0" y1="85" x2="180" y2="85" stroke="#334155"/><text x="10" y="100" class="meth">+ overitPodminky()</text></g>

    <g transform="translate(600, 350)"><rect x="0" y="0" width="200" height="130" class="cls"/><text x="100" y="20" class="hdr">KomentářReakce</text><line x1="0" y1="28" x2="200" y2="28" stroke="#334155"/><text x="10" y="45" class="attr">- interakceID: int [PK]</text><text x="10" y="60" class="attr">- textObsah: string</text><text x="10" y="75" class="attr">- emotikon: string</text><text x="10" y="90" class="attr">- casVytvoreni: DateTime</text><line x1="0" y1="100" x2="200" y2="100" stroke="#334155"/><text x="10" y="115" class="meth">+ pridatInterakci()</text><text x="10" y="125" class="meth">+ smazatAdminem()</text></g>

    <line x1="210" y1="115" x2="280" y2="115" stroke="#334155" stroke-width="1.5"/><text x="220" y="110" font-family="Arial" font-size="11">1</text><text x="260" y="110" font-family="Arial" font-size="11">*</text>
    <line x1="130" y1="150" x2="130" y2="280" stroke="#334155" stroke-width="1.5"/><text x="135" y="165" font-family="Arial" font-size="11">1</text><text x="135" y="270" font-family="Arial" font-size="11">*</text>
    <line x1="390" y1="230" x2="390" y2="260" stroke="#334155" stroke-width="1.5"/><line x1="390" y1="260" x2="140" y2="260" stroke="#334155" stroke-width="1.5"/><line x1="140" y1="260" x2="140" y2="280" stroke="#334155" stroke-width="1.5" marker-start="url(#agg)"/><text x="375" y="245" font-family="Arial" font-size="11">1..*</text><text x="150" y="275" font-family="Arial" font-size="11">1</text>
    <line x1="230" y1="360" x2="300" y2="360" stroke="#334155" stroke-width="1.5"/><text x="240" y="350" font-family="Arial" font-size="11">2</text><text x="280" y="350" font-family="Arial" font-size="11">*</text>
    <line x1="140" y1="400" x2="140" y2="480" stroke="#334155" stroke-width="1.5"/><text x="145" y="415" font-family="Arial" font-size="11">2</text><text x="145" y="470" font-family="Arial" font-size="11">*</text>
    <line x1="520" y1="410" x2="600" y2="410" stroke="#334155" stroke-width="1.5" marker-start="url(#agg)"/><text x="535" y="405" font-family="Arial" font-size="11">1</text><text x="585" y="405" font-family="Arial" font-size="11">*</text>
    <line x1="500" y1="135" x2="580" y2="135" stroke="#334155" stroke-width="1.5"/><text x="510" y="130" font-family="Arial" font-size="11">1</text><text x="565" y="130" font-family="Arial" font-size="11">*</text>
    <line x1="500" y1="180" x2="850" y2="180" stroke="#334155" stroke-width="1.5"/><line x1="850" y1="180" x2="850" y2="240" stroke="#334155" stroke-width="1.5"/><text x="510" y="175" font-family="Arial" font-size="11">1</text><text x="835" y="230" font-family="Arial" font-size="11">*</text>
    <line x1="480" y1="230" x2="480" y2="280" stroke="#334155" stroke-width="1.5"/><line x1="480" y1="280" x2="700" y2="280" stroke="#334155" stroke-width="1.5"/><line x1="700" y1="280" x2="700" y2="350" stroke="#334155" stroke-width="1.5"/><text x="485" y="245" font-family="Arial" font-size="11">1</text><text x="705" y="340" font-family="Arial" font-size="11">*</text>
</svg>
