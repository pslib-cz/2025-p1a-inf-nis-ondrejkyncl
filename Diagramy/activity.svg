<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" width="100%" height="100%">
    <defs>
        <marker id="arrow2" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
        </marker>
    </defs>
    <style>
        .title { font-family: 'Arial', sans-serif; font-size: 16px; font-weight: bold; fill: #0f172a; text-anchor: middle; }
        .lane { font-family: 'Arial', sans-serif; font-size: 13px; font-weight: bold; fill: #334155; text-anchor: middle; }
        .shape { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
        .node-text { font-family: 'Arial', sans-serif; font-size: 12px; fill: #1e293b; text-anchor: middle; }
    </style>
    
    <text x="450" y="30" class="title">2. DIAGRAM FUNKCÍ A AKCÍ (ZÁZNAM ZÁPASU)</text>
    
    <line x1="300" y1="60" x2="300" y2="600" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="600" y1="60" x2="600" y2="600" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="150" y="80" class="lane">Hráč (Zadavatel)</text>
    <text x="450" y="80" class="lane">Systém FoosLib</text>
    <text x="750" y="80" class="lane">Soupeř</text>
    
    <circle cx="150" cy="110" r="10" fill="#1e293b"/>
    <line x1="150" y1="120" x2="150" y2="150" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow2)"/>
    
    <rect x="50" y="150" width="200" height="40" class="shape"/>
    <text x="150" y="174" class="node-text">Zadat skóre a odeslat</text>
    <line x1="250" y1="170" x2="350" y2="170" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow2)"/>
    
    <rect x="350" y="150" width="200" height="40" class="shape"/>
    <text x="450" y="174" class="node-text">Zpracovat požadavek</text>
    <line x1="550" y1="170" x2="650" y2="170" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow2)"/>
    
    <rect x="650" y="150" width="200" height="40" class="shape"/>
    <text x="750" y="174" class="node-text">Zkontrolovat výsledek</text>
    <line x1="750" y1="190" x2="750" y2="230" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow2)"/>
    
    <polygon points="750,230 785,260 750,290 715,260" fill="#f8fafc" stroke="#334155" stroke-width="1.5"/>
    <text x="795" y="265" class="node-text">[Ne]</text>
    <text x="680" y="250" class="node-text">[Ano]</text>
    <line x1="715" y1="260" x2="550" y2="260" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow2)"/>
    
    <rect x="350" y="240" width="200" height="40" class="shape"/>
    <text x="450" y="264" class="node-text">Uložit zápas do DB a feedu</text>
    <line x1="450" y1="280" x2="450" y2="330" stroke="#334155" stroke-width="1.5" marker-end="url(#arrow2)"/>
    
    <circle cx="450" cy="340" r="10" fill="none" stroke="#1e293b" stroke-width="2"/>
    <circle cx="450" cy="340" r="5" fill="#1e293b"/>
</svg>