<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="100%" height="100%">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
        </marker>
    </defs>
    <style>
        .title { font-family: 'Arial', sans-serif; font-size: 16px; font-weight: bold; fill: #0f172a; text-anchor: middle; }
        .actor { font-family: 'Arial', sans-serif; font-size: 11px; font-weight: bold; fill: #0f172a; text-anchor: middle; }
        .uc { fill: #fafafa; stroke: #475569; stroke-width: 1.5; }
        .conn { fill: none; stroke: #475569; stroke-width: 1.2; }
    </style>
    <text x="500" y="30" class="title">1. KOMPLEXNÍ USE CASE DIAGRAM - FOOSLIB</text>
    <rect x="250" y="50" width="700" height="720" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6 4"/>
    
    <g transform="translate(100,120)">
        <circle cx="0" cy="-20" r="10" fill="none" stroke="#334155" stroke-width="1.5"/><line x1="0" y1="-10" x2="0" y2="15" stroke="#334155" stroke-width="1.5"/><line x1="-15" y1="0" x2="15" y2="0" stroke="#334155" stroke-width="1.5"/><line x1="0" y1="15" x2="-10" y2="35" stroke="#334155" stroke-width="1.5"/><line x1="0" y1="15" x2="10" y2="35" stroke="#334155" stroke-width="1.5"/><text x="0" y="55" class="actor">Divák</text>
    </g>
    <g transform="translate(100,350)">
        <circle cx="0" cy="-20" r="10" fill="none" stroke="#334155" stroke-width="1.5"/><line x1="0" y1="-10" x2="0" y2="15" stroke="#334155" stroke-width="1.5"/><line x1="-15" y1="0" x2="15" y2="0" stroke="#334155" stroke-width="1.5"/><line x1="0" y1="15" x2="-10" y2="35" stroke="#334155" stroke-width="1.5"/><line x1="0" y1="15" x2="10" y2="35" stroke="#334155" stroke-width="1.5"/><text x="0" y="55" class="actor">Hráč (Student)</text>
    </g>
    <g transform="translate(100,550)">
        <circle cx="0" cy="-20" r="10" fill="none" stroke="#334155" stroke-width="1.5"/><line x1="0" y1="-10" x2="0" y2="15" stroke="#334155" stroke-width="1.5"/><line x1="-15" y1="0" x2="15" y2="0" stroke="#334155" stroke-width="1.5"/><line x1="0" y1="15" x2="-10" y2="35" stroke="#334155" stroke-width="1.5"/><line x1="0" y1="15" x2="10" y2="35" stroke="#334155" stroke-width="1.5"/><text x="0" y="55" class="actor">Kapitán týmu</text>
    </g>
    <g transform="translate(100,700)">
        <circle cx="0" cy="-20" r="10" fill="none" stroke="#334155" stroke-width="1.5"/><line x1="0" y1="-10" x2="0" y2="15" stroke="#334155" stroke-width="1.5"/><line x1="-15" y1="0" x2="15" y2="0" stroke="#334155" stroke-width="1.5"/><line x1="0" y1="15" x2="-10" y2="35" stroke="#334155" stroke-width="1.5"/><line x1="0" y1="15" x2="10" y2="35" stroke="#334155" stroke-width="1.5"/><text x="0" y="55" class="actor">Administrátor</text>
    </g>

    <ellipse cx="450" cy="120" rx="110" ry="25" class="uc"/><text x="450" y="124" font-family="Arial" font-size="11" text-anchor="middle">Prohlížení veřejného feedu</text>
    <ellipse cx="450" cy="190" rx="110" ry="25" class="uc"/><text x="450" y="194" font-family="Arial" font-size="11" text-anchor="middle">Registrace / Login (@pslib.cz)</text>
    <ellipse cx="450" cy="260" rx="110" ry="25" class="uc"/><text x="450" y="264" font-family="Arial" font-size="11" text-anchor="middle">Záznam odehraného zápasu</text>
    <ellipse cx="750" cy="260" rx="110" ry="25" class="uc"/><text x="750" y="264" font-family="Arial" font-size="11" text-anchor="middle">Dvoufázové ověření oponentem</text>
    <ellipse cx="450" cy="330" rx="110" ry="25" class="uc"/><text x="450" y="334" font-family="Arial" font-size="11" text-anchor="middle">Interakce s feedem (Reakce)</text>
    <ellipse cx="450" cy="400" rx="110" ry="25" class="uc"/><text x="450" y="404" font-family="Arial" font-size="11" text-anchor="middle">Získávání achievementů</text>
    <ellipse cx="450" cy="470" rx="110" ry="25" class="uc"/><text x="450" y="474" font-family="Arial" font-size="11" text-anchor="middle">Odeslání herní výzvy týmu</text>
    <ellipse cx="450" cy="550" rx="110" ry="25" class="uc"/><text x="450" y="554" font-family="Arial" font-size="11" text-anchor="middle">Správa týmové soupisky</text>
    <ellipse cx="450" cy="700" rx="110" ry="25" class="uc"/><text x="450" y="704" font-family="Arial" font-size="11" text-anchor="middle">Moderování obsahu a sporů</text>

    <line x1="130" y1="120" x2="340" y2="120" class="conn"/>
    <line x1="130" y1="350" x2="340" y2="190" class="conn"/>
    <line x1="130" y1="350" x2="340" y2="260" class="conn"/>
    <line x1="130" y1="350" x2="340" y2="330" class="conn"/>
    <line x1="130" y1="350" x2="340" y2="400" class="conn"/>
    <line x1="130" y1="350" x2="340" y2="470" class="conn"/>
    <line x1="130" y1="550" x2="340" y2="550" class="conn"/>
    <line x1="130" y1="700" x2="340" y2="700" class="conn"/>
    
    <line x1="560" y1="260" x2="640" y2="260" stroke="#475569" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
    <text x="600" y="250" font-family="Arial" font-size="11" text-anchor="middle">&lt;&lt;include&gt;&gt;</text>
