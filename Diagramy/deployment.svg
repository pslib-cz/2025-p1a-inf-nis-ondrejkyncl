<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" width="100%" height="100%">
    <style>
        .title { font-family: 'Arial', sans-serif; font-size: 16px; font-weight: bold; fill: #0f172a; text-anchor: middle; }
        .box { fill: #fafafa; stroke: #334155; stroke-width: 1.5; }
        .hdr { fill: #e2e8f0; stroke: #334155; stroke-width: 1.5; }
        .node { font-family: 'Arial', sans-serif; font-size: 12px; font-weight: bold; fill: #1e293b; text-anchor: middle; }
        .desc { font-family: 'Arial', sans-serif; font-size: 11px; fill: #1e293b; text-anchor: middle; }
    </style>
    
    <text x="450" y="30" class="title">3. DIAGRAM TECHNOLOGIE A NASAZENÍ</text>
    
    <rect x="50" y="100" width="240" height="200" class="box"/>
    <rect x="50" y="100" width="100" height="20" class="hdr"/>
    <text x="100" y="114" class="node">«device»</text>
    <text x="170" y="150" class="node">Mobilní zařízení / PC</text>
    <rect x="70" y="180" width="200" height="100" fill="none" stroke="#334155" stroke-dasharray="4 4" stroke-width="1.5"/>
    <text x="170" y="210" class="node">«artifact»</text>
    <text x="170" y="230" class="desc">HTML5 Web Application</text>
    
    <ellipse cx="450" cy="200" rx="70" ry="40" class="box" fill="#f1f5f9"/>
    <text x="450" y="205" class="node">Internet</text>
    <line x1="290" y1="200" x2="380" y2="200" stroke="#334155" stroke-width="1.5"/>
    <text x="335" y="190" class="desc">HTTPS</text>
    
    <rect x="610" y="100" width="240" height="200" class="box"/>
    <rect x="610" y="100" width="100" height="20" class="hdr"/>
    <text x="660" y="114" class="node">«server»</text>
    <text x="730" y="150" class="node">Aplikační Server Node.js</text>
    <line x1="520" y1="200" x2="610" y2="200" stroke="#334155" stroke-width="1.5"/>
    <text x="565" y="190" class="desc">REST API</text>
    
    <rect x="610" y="400" width="240" height="150" class="box"/>
    <rect x="610" y="400" width="100" height="20" class="hdr"/>
    <text x="660" y="414" class="node">«database»</text>
    <text x="730" y="450" class="node">PostgreSQL Server</text>
    <line x1="730" y1="300" x2="730" y2="400" stroke="#334155" stroke-width="1.5"/>
    <text x="770" y="355" class="desc">TCP/IP</text>
</svg>